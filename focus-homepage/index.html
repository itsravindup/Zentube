<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModeTube — Stay Focused</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="zen-body">
    <!-- Ambient Background Element -->
    <div class="ambient-glow"></div>

    <!-- Top Navigation / Timer Bar -->
    <header class="zen-header fade-in">
        <div class="timer-container group">
            <span class="icon-timer">timer</span>
            <span id="zen-timer" class="timer-text">25:00</span>
            <div class="timer-pulse"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="zen-main">
        <!-- Branding Section -->
        <section class="zen-brand fade-in">
            <div class="zen-logo-box group">
                <div class="zen-logo-gradient"></div>
                <span class="zen-logo-char">M</span>
            </div>
            <h1 class="zen-title">ModeTube</h1>
            <p class="zen-tagline">Intentional Viewing</p>
        </section>

        <!-- Search Section -->
        <section class="zen-search-section fade-in">
            <div class="search-outer group">
                <div class="search-glow"></div>
                <div class="search-inner">
                    <div class="search-icon-wrapper">
                        <span class="icon-search">search</span>
                    </div>
                    <form id="search-form" class="search-form">
                        <input type="text" id="search-input" placeholder="Search with intention..." autocomplete="off">
                    </form>
                    <button id="search-btn" class="search-action-btn">
                        <span class="icon-arrow">arrow_forward</span>
                    </button>
                </div>
            </div>

            <!-- Motivational Quote -->
            <div class="quote-container">
                <p id="zen-quote" class="zen-quote">"You came here to learn. Don't get distracted."</p>
                <div class="quote-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </section>

        <!-- Focus Library Section -->
        <section class="zen-library-section fade-in">
            <div class="library-header-main" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <div style="display: flex; align-items: center; gap: 0.75rem; color: var(--on-surface-variant);">
                    <span class="library-icon">folder_open</span>
                    <h2 class="library-title">Your Focus Library</h2>
                </div>
                <div class="library-search" style="position: relative;">
                    <span class="material-symbols-outlined" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; color: var(--on-surface-variant); opacity: 0.6;">search</span>
                    <input type="text" id="lib-search-input" placeholder="Search library..." style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 9999px; padding: 6px 12px 6px 36px; color: var(--on-surface); outline: none; font-family: inherit; font-size: 0.85rem; width: 180px; transition: all 0.3s;">
                </div>
            </div>

            <!-- Add Link UI -->
            <div class="library-add-container">
                <div class="library-input-group">
                    <input type="text" id="lib-link-input" placeholder="Paste YouTube link..." autocomplete="off">
                    <input type="text" id="lib-folder-input" list="folder-options" placeholder="Folder name (e.g. Study)" autocomplete="off">
                    <datalist id="folder-options"></datalist>
                </div>
                <button id="lib-add-btn" class="lib-add-btn">
                    <span class="material-symbols-outlined">add</span>
                    <span>Add</span>
                </button>
            </div>
            
            <!-- Error Message -->
            <div id="library-error" class="library-error-msg"></div>

            <!-- Library Content Rendering Area -->
            <div id="library-display" class="library-display">
                <!-- Dynamically populated -->
            </div>
        </section>
    </main>



    <!-- Corner Accents -->
    <div class="accent-top-left"></div>
    <div class="accent-bottom-right"></div>

    <script src="./script.js"></script>
</body>
</html>
